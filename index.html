<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABC Inventory AI Master</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --accent: #8b5cf6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 10px; color: var(--text); }
        .container { max-width: 500px; margin: 0 auto; }
        .image-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .preview-img { width: 100%; border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; }
        label { display: block; font-size: 0.7rem; font-weight: bold; color: #64748b; text-transform: uppercase; margin-top: 10px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ai-btn { background: var(--accent); color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; margin: 15px 0; cursor: pointer; }
        .export-btn { background: #059669; color: white; width: 100%; padding: 20px; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center;">📦 ABC Inventory AI</h2>
    <div style="background: var(--primary); color:white; padding: 25px; border-radius: 15px; margin-bottom: 25px; text-align:center;">
        <p style="margin:0; font-weight:bold;">Step 1: Upload Photo</p>
        <input type="file" id="fileInput" accept="image/*" style="margin-top:15px;">
    </div>
    <div id="imageGrid"></div>
    <button class="export-btn" onclick="exportToCSV()">💾 Step 2: Export CSV</button>
</div>
<script>
    const KEY = "AIzaSyCzXpxFjB1DUBVutoEUxHz_8QsyVVLY9qg";
    const fileInput = document.getElementById('fileInput');
    const imageGrid = document.getElementById('imageGrid');
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.innerHTML = `
                <img src="${event.target.result}" class="preview-img">
                <label>Product Title</label>
                <input type="text" class="title">
                <div class="field-row">
                    <div><label>Size</label><input type="text" class="size"></div>
                    <div><label>Value</label><input type="text" class="val"></div>
                </div>
                <button class="ai-btn" onclick="runAI(this)">✨ Auto-Identify Item</button>
                <label>Description</label>
                <textarea class="desc" rows="5"></textarea>
            `;
            imageGrid.appendChild(card);
        };
        reader.readAsDataURL(file);
    });
    async function runAI(btn) {
        const card = btn.closest('.image-card');
        const imgElement = card.querySelector('.preview-img');
        btn.innerText = "🔍 Appraising...";
        btn.disabled = true;
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;
        try {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 800;
            canvas.height = (imgElement.naturalHeight / imgElement.naturalWidth) * 800;
            ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);
            const base64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [
                        { text: "Identify this item. Return ONLY JSON: {title: 'Name', size: 'Size', value: 'Val', description: '3 sentences'}" },
                        { inline_data: { mime_type: "image/jpeg", data: base64 } }
                    ]}]
                })
            });
            const data = await res.json();
            const json = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim());
            card.querySelector('.title').value = json.title;
            card.querySelector('.size').value = json.size;
            card.querySelector('.val').value = json.value;
            card.querySelector('.desc').value = json.description;
            btn.innerText = "✅ Done!";
        } catch (e) {
            alert("Error: " + e.message);
            btn.innerText = "✨ Try Again";
            btn.disabled = false;
        }
    }
    function exportToCSV() {
        let csv = "Title,Size,Value,Description\n";
        document.querySelectorAll('.image-card').forEach(c => {
            const row = [c.querySelector('.title').value, c.querySelector('.size').value, c.querySelector('.val').value, c.querySelector('.desc').value.replace(/"/g, '""')];
            csv += `"${row.join('","')}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'Inventory.csv';
        a.click();
    }
</script>
</body>
</html>
