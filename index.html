<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABC AI Master - Diagnostic Version</title>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --accent: #8b5cf6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 10px; color: var(--text); }
        .container { max-width: 500px; margin: 0 auto; }
        .image-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .preview-img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        label { display: block; font-size: 0.7rem; font-weight: bold; color: #64748b; text-transform: uppercase; margin-top: 10px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .ai-btn { background: var(--accent); color: white; width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: bold; margin: 15px 0; cursor: pointer; }
        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">📦 ABC Inventory Debugger</h2>
    
    <div style="background: var(--primary); color:white; padding: 25px; border-radius: 15px; margin-bottom: 20px; text-align:center;">
        <p style="margin:0; font-weight:bold;">Upload Screenshot or Photo</p>
        <input type="file" id="fileInput" accept="image/*" style="margin-top:10px;">
    </div>
    
    <div id="imageGrid"></div>
</div>

<script>
    // YOUR KEY
    const KEY = "AIzaSyCzXpxFjB1DUBVutoEUxHz_8QsyVVLY9qg";

    const fileInput = document.getElementById('fileInput');
    const imageGrid = document.getElementById('imageGrid');

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.innerHTML = `
                <img src="${event.target.result}" class="preview-img">
                <button class="ai-btn" onclick="runAI(this)">✨ Test AI Connection</button>
                <textarea class="desc" rows="5" readonly placeholder="Results will appear here..."></textarea>
            `;
            imageGrid.appendChild(card);
        };
        reader.readAsDataURL(file);
    });

    async function runAI(btn) {
        const card = btn.closest('.image-card');
        const imgElement = card.querySelector('.preview-img');
        const output = card.querySelector('.desc');
        
        btn.innerText = "⏳ Connecting to Google...";
        btn.classList.add('loading');

        try {
            // High-compression for test
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 600;
            canvas.height = (imgElement.naturalHeight / imgElement.naturalWidth) * 600;
            ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);
            const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [
                        { text: "Identify this item in 10 words." },
                        { inline_data: { mime_type: "image/jpeg", data: base64 } }
                    ]}]
                })
            });

                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [
                        { text: "Identify this item in 10 words." },
                        { inline_data: { mime_type: "image/jpeg", data: base64 } }
                    ]}]
                })
            });

            const data = await response.json();

            if (data.error) {
                // This shows the EXACT reason from Google
                alert("GOOGLE ERROR: " + data.error.message);
                output.value = "Error Details: " + JSON.stringify(data.error, null, 2);
            } else {
                output.value = data.candidates[0].content.parts[0].text;
                btn.innerText = "✅ Connection Fixed!";
                btn.style.background = "#059669";
            }
        } catch (e) {
            alert("LOCAL ERROR: Check your internet or browser settings.");
            output.value = e.toString();
        } finally {
            btn.classList.remove('loading');
        }
    }
</script>
</body>
</html>
