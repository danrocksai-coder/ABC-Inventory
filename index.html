<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Photo Inventory</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
    h1 { text-align: center; color: #333; }
    button { padding: 12px 20px; font-size: 18px; margin: 10px; cursor: pointer; }
    #takePhoto { background: #4CAF50; color: white; border: none; border-radius: 8px; }
    #export { background: #2196F3; color: white; border: none; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #f2f2f2; }
    img.thumb { max-width: 80px; height: auto; border-radius: 4px; }
    input { width: 90%; padding: 6px; }
  </style>
</head>
<body>

  <h1>Simple Photo Inventory</h1>
  <p>Take photos → they appear in the table with a number → export to CSV anytime.</p>

  <button id="takePhoto">📸 Take / Add Photo</button>
  <input type="file" id="fileInput" accept="image/*" style="display:none;">

  <button id="export">💾 Export to CSV</button>

  <table id="inventoryTable">
    <thead>
      <tr>
        <th>#</th>
        <th>Photo</th>
        <th>Name</th>
        <th>Description</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <script>
    const fileInput = document.getElementById('fileInput');
    const takePhotoBtn = document.getElementById('takePhoto');
    const exportBtn = document.getElementById('export');
    const tableBody = document.getElementById('tableBody');

    let itemCounter = 1;

    // Open camera/file picker
    takePhotoBtn.addEventListener('click', () => {
      fileInput.click();
    });

    // When photo is selected
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        const base64 = event.target.result;  // data:image/jpeg;base64,...

        // Create new row
        const row = document.createElement('tr');

        row.innerHTML = `
          <td>${itemCounter}</td>
          <td><img src="${base64}" class="thumb" alt="Item ${itemCounter}"></td>
          <td><input type="text" placeholder="e.g. Blue Chair"></td>
          <td><input type="text" placeholder="e.g. Wooden, good condition"></td>
        `;

        tableBody.appendChild(row);
        itemCounter++;
        fileInput.value = '';  // reset for next upload
      };
      reader.readAsDataURL(file);
    });

    // Export table to CSV
    exportBtn.addEventListener('click', () => {
      if (tableBody.rows.length === 0) {
        alert("No items yet!");
        return;
      }

      let csv = "Number,Name,Description,Image_Base64\n";

      for (let row of tableBody.rows) {
        const cells = row.querySelectorAll('td');
        const num = cells[0].textContent;
        const name = cells[2].querySelector('input').value.replace(/"/g, '""');
        const desc = cells[3].querySelector('input').value.replace(/"/g, '""');
        const imgSrc = cells[1].querySelector('img').src;

        csv += `"${num}","${name}","${desc}","${imgSrc}"\n`;
      }

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `inventory_${new Date().toISOString().slice(0,10)}.csv`;
      link.click();
      URL.revokeObjectURL(url);
    });
  </script>

</body>
</html>
