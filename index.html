<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dan Rock Inventory Tool V2</title>

<style>
body {
  font-family: Arial;
  margin: 16px;
  background: #f5f5f5;
}

.card {
  background: white;
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 16px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: black;
  color: white;
  margin: 5px 0;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 8px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>Inventory Tool V2</h1>

<!-- PROJECT LIST -->
<div id="projectList" class="card">
  <h2>Projects</h2>
  <div id="projectsContainer"></div>
  <button onclick="createProject()">+ New Project</button>
</div>

<!-- PROJECT VIEW -->
<div id="projectView" class="card hidden">
  <button onclick="goBack()">← Back</button>

  <h2 id="projectTitle"></h2>

  <input id="clientName" placeholder="Client Name">
  <input id="projectName" placeholder="Project Name">

  <button onclick="saveProjectMeta()">Save Project Info</button>

  <hr>

  <input type="file" id="fileInput" accept="image/*" capture="environment">
  <button onclick="addPhoto()">Add Photo</button>

  <div id="itemsContainer"></div>

  <button onclick="exportCSV()">Export CSV</button>
</div>

<script>
let db;

const request = indexedDB.open("InventoryV2", 1);

request.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("projects", { keyPath: "id" });
};

request.onsuccess = e => {
  db = e.target.result;
  loadProjects();
};

function loadProjects() {
  const tx = db.transaction("projects", "readonly");
  const store = tx.objectStore("projects");
  const req = store.getAll();

  req.onsuccess = () => {
    const container = document.getElementById("projectsContainer");
    container.innerHTML = "";

    req.result.forEach(p => {
      const div = document.createElement("div");
      div.innerHTML = `
        <b>${p.name || "Untitled"}</b>
        <button onclick="openProject('${p.id}')">Open</button>
        <button onclick="deleteProject('${p.id}')">Delete</button>
      `;
      container.appendChild(div);
    });
  };
}

function createProject() {
  const id = Date.now().toString();

  const tx = db.transaction("projects", "readwrite");
  const store = tx.objectStore("projects");

  store.add({
    id,
    name: "New Project",
    client: "",
    items: []
  });

  loadProjects();
}

function deleteProject(id) {
  const tx = db.transaction("projects", "readwrite");
  tx.objectStore("projects").delete(id);
  loadProjects();
}

let currentProject = null;

function openProject(id) {
  const tx = db.transaction("projects", "readonly");
  const store = tx.objectStore("projects");

  store.get(id).onsuccess = e => {
    currentProject = e.target.result;

    document.getElementById("projectList").classList.add("hidden");
    document.getElementById("projectView").classList.remove("hidden");

    document.getElementById("projectTitle").innerText = currentProject.name;
    document.getElementById("clientName").value = currentProject.client;
    document.getElementById("projectName").value = currentProject.name;

    renderItems();
  };
}

function goBack() {
  document.getElementById("projectView").classList.add("hidden");
  document.getElementById("projectList").classList.remove("hidden");
  loadProjects();
}

function saveProjectMeta() {
  currentProject.client = document.getElementById("clientName").value;
  currentProject.name = document.getElementById("projectName").value;

  const tx = db.transaction("projects", "readwrite");
  tx.objectStore("projects").put(currentProject);

  alert("Saved");
}
