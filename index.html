<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Image to Spreadsheet Utility</title>
	<style>
		:root {
			--primary: #2563eb;
			--bg: #f8fafc;
			--card: #ffffff;
			--text: #1e293b;
		}

		body {
			font-family: -apple-system, system-ui, sans-serif;
			background: var(--bg);
			color: var(--text);
			padding: 2rem;
		}

		.container {
			max-width: 1000px;
			margin: 0 auto;
		}

		.header {
			text-align: center;
			margin-bottom: 2rem;
		}

		.upload-area {
			background: var(--card);
			border: 2px dashed #cbd5e1;
			padding: 2rem;
			border-radius: 12px;
			text-align: center;
			cursor: pointer;
			transition: border-color 0.3s;
		}

		.upload-area:hover {
			border-color: var(--primary);
		}

		.image-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
			gap: 1.5rem;
			margin-top: 2rem;
		}

		.image-card {
			background: var(--card);
			padding: 1rem;
			border-radius: 8px;
			box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
		}

		.preview-img {
			width: 100%;
			height: 150px;
			object-fit: cover;
			border-radius: 4px;
			margin-bottom: 0.5rem;
		}

		label {
			display: block;
			font-size: 0.8rem;
			font-weight: bold;
			margin-top: 0.5rem;
			color: #64748b;
		}

		input,
		textarea {
			width: 100%;
			padding: 0.5rem;
			margin-top: 0.2rem;
			border: 1px solid #e2e8f0;
			border-radius: 4px;
			box-sizing: border-box;
			font-family: inherit;
		}

		.actions {
			margin-top: 2rem;
			display: flex;
			gap: 1rem;
			justify-content: center;
		}

		button {
			padding: 0.8rem 1.5rem;
			border: none;
			border-radius: 6px;
			font-weight: 600;
			cursor: pointer;
			transition: opacity 0.2s;
		}

		.btn-export {
			background: #059669;
			color: white;
		}

		.btn-clear {
			background: #ef4444;
			color: white;
		}

		button:hover {
			opacity: 0.9;
		}
	</style>
</head>

<body>

	<div class="container">
		<div class="header">
			<h1>📸 Image to Spreadsheet Tool</h1>
			<p>Upload images to generate descriptions and a CSV manifest for your project.</p>
		</div>

		<div class="upload-area" onclick="document.getElementById('fileInput').click()">
			<p>Click to upload or drag and drop images</p>
			<input type="file" id="fileInput" multiple accept="image/*" style="display:none">
		</div>

		<div class="image-grid" id="imageGrid"></div>

		<div class="actions" id="actionArea" style="display:none">
			<button class="btn-export" onclick="exportToCSV()">💾 Export to Spreadsheet (CSV)</button>
			<button class="btn-clear" onclick="location.reload()">Reset</button>
		</div>
	</div>

	<script>
		const fileInput = document.getElementById('fileInput');
		const imageGrid = document.getElementById('imageGrid');
		const actionArea = document.getElementById('actionArea');
		let imageData = [];

		fileInput.addEventListener('change', handleFiles);

		function handleFiles(e) {
			const files = Array.from(e.target.files);
			if (files.length > 0) actionArea.style.display = 'flex';

			files.forEach(file => {
				const reader = new FileReader();
				reader.onload = (event) => {
					const id = Date.now() + Math.random();
					const card = document.createElement('div');
					card.className = 'image-card';
					card.innerHTML = `
                    <img src="${event.target.result}" class="preview-img">
                    <label>Original Filename</label>
                    <input type="text" value="${file.name}" readonly style="background: #f1f5f9">
                    
                    <label>New Optimized Name (e.g., product-01)</label>
                    <input type="text" class="new-name" placeholder="new-filename-here">
                    
                    <label>Description / Alt Text</label>
                    <textarea class="desc" rows="3" placeholder="Describe this image..."></textarea>
                `;
					imageGrid.appendChild(card);

					// Track data
					imageData.push({
						originalName: file.name,
						cardElement: card
					});
				};
				reader.readAsDataURL(file);
			});
		}

		function exportToCSV() {
			let csvContent = "data:text/csv;charset=utf-8,Original Name,New Name,Description\n";

			const cards = document.querySelectorAll('.image-card');
			cards.forEach(card => {
				const orig = card.querySelector('input[readonly]').value;
				const newName = card.querySelector('.new-name').value || "unnamed";
				const desc = card.querySelector('.desc').value.replace(/,/g, ";"); // Prevent CSV break

				csvContent += `"${orig}","${newName}","${desc}"\n`;
			});

			const encodedUri = encodeURI(csvContent);
			const link = document.createElement("a");
			link.setAttribute("href", encodedUri);
			link.setAttribute("download", "image_metadata_manifest.csv");
			document.body.appendChild(link);
			link.click();
			document.body.removeChild(link);
		}
	</script>

</body>

</html>
